    /* ─── Design Tokens ──────────────────────────────────────────────────── */
    :root {
      /* Backgrounds */
      --ink:        #0a0e17;
      --slate:      #111827;
      --card:       #1a2035;
      --card-hover: #1f2847;
      /* Borders & Text */
      --border:     #2a3352;
      --text:       #e8ecf4;
      --text-dim:   #7a849b;
      /* Accent colours */
      --blue:         #4f8ff7;
      --blue-glow:    rgba(79,143,247,0.15);
      --amber:        #f7b955;
      --amber-glow:   rgba(247,185,85,0.15);
      --emerald:      #34d399;
      --emerald-glow: rgba(52,211,153,0.15);
      --rose:         #f472b6;
      --rose-glow:    rgba(244,114,182,0.15);
      --violet:       #a78bfa;
      --violet-glow:  rgba(167,139,250,0.15);
      --cyan:         #22d3ee;
    }

    /* ─── Reset & Base ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--ink);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── Header ─────────────────────────────────────────────────────────── */
    .header {
      padding: 2.5rem 3rem 2rem;
      background: linear-gradient(160deg, var(--ink) 0%, var(--slate) 40%, #0f1a2e 100%);
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    /* Title: two spans — white word + blue italic word, both Ashbury */
    .header-left h1 {
      font-family: 'Ashbury', serif;
      font-weight: 300;
      font-size: 2.8rem;
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    .title-part1 { color: #ffffff; }                        /* REPLACE: word 1 */
    .title-part2 { color: #1a76da; font-style: italic; }    /* REPLACE: word 2 */

    .header-left .subtitle {
      font-size: 0.95rem;
      color: var(--text-dim);
      margin-top: 0.4rem;
      font-weight: 400;
    }

    .header-left .refresh-ts {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 0.2rem;
      opacity: 0.7;
    }

    /* Logo — centred absolutely so it does not shift the title */
    .header-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
    }

    .header-logo { height: 80px; width: auto; }

    /* ─── Main Dashboard Area ────────────────────────────────────────────── */
    .dashboard { padding: 1.5rem 3rem 3rem; }

    /* ─── KPI Cards ──────────────────────────────────────────────────────── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .kpi {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.2rem 1.4rem;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
      animation: fadeUp 0.5s ease-out both;
    }

    .kpi:hover {
      transform: translateY(-2px);
      border-color: var(--blue);
    }

    .kpi .glow {
      position: absolute;
      top: -40%;
      left: -20%;
      width: 140%;
      height: 140%;
      border-radius: 50%;
      filter: blur(25px);
      opacity: 0.4;
      pointer-events: none;
    }

    .kpi-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      position: relative;
    }

    .kpi-label {
      font-size: 0.72rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 0.4rem;
      font-weight: 500;
      position: relative;
    }

    /* ─── Chart / Content Cards ──────────────────────────────────────────── */
    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .chart-grid.single { grid-template-columns: 1fr; }
    .chart-grid.thirds { grid-template-columns: 1fr 1fr 1fr; }

    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
    }

    .chart-card.full { grid-column: 1 / -1; }

    .chart-card .card-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 1rem;
    }

    /* ─── Pill / Badge System ────────────────────────────────────────────── */
    .pill {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2em 0.65em;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .pill-blue    { background: var(--blue-glow);    color: var(--blue);    }
    .pill-amber   { background: var(--amber-glow);   color: var(--amber);   }
    .pill-emerald { background: var(--emerald-glow); color: var(--emerald); }
    .pill-rose    { background: var(--rose-glow);    color: var(--rose);    }
    .pill-violet  { background: var(--violet-glow);  color: var(--violet);  }

    /* ─── Responsive ─────────────────────────────────────────────────────── */
    @media (max-width: 900px) {
      .header     { padding: 1.5rem; }
      .dashboard  { padding: 1rem 1.5rem; }
      .chart-grid { grid-template-columns: 1fr; }
      .kpi-row    { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

       • .title-part2 text  →  second word (blue italic, Ashbury)
       • .subtitle text     →  e.g. "Customer Success — Pipeline Overview"
       • .refresh-ts text   →  e.g. "Last refreshed: 1 April 2026"
       • Logo is the BI logo embedded as base64 — replace src if needed
  ════════════════════════════════════════════════════════════════════════ -->

      <h1>
        <span class="title-part1"><!-- REPLACE: word 1 --></span>
        <span class="title-part2"><!-- REPLACE: word 2 --></span>
      </h1>
      <p class="subtitle"><!-- REPLACE: subtitle --></p>

  <!-- ═══════════════════════════════════════════════════════════════════════
       DASHBOARD BODY
  ════════════════════════════════════════════════════════════════════════ -->
  <div class="dashboard">

    <!-- ── KPI ROW ───────────────────────────────────────────────────────────
         Accent options: --blue  --amber  --emerald  --violet  --rose
         Set glow background + kpi-value color to the same accent variable.
         Add or remove .kpi blocks as needed (grid auto-fits from minmax 170px).
    ─────────────────────────────────────────────────────────────────────── -->
    <div class="kpi-row">

      <div class="kpi">
        <div class="glow" style="background:var(--blue)"></div>
        <div class="kpi-value" style="color:var(--blue)"><!-- REPLACE: value --></div>
        <div class="kpi-label"><!-- REPLACE: LABEL --></div>
      </div>

      <div class="kpi">
        <div class="glow" style="background:var(--amber)"></div>
        <div class="kpi-value" style="color:var(--amber)"><!-- REPLACE: value --></div>
        <div class="kpi-label"><!-- REPLACE: LABEL --></div>
      </div>

      <div class="kpi">
        <div class="glow" style="background:var(--emerald)"></div>
        <div class="kpi-value" style="color:var(--emerald)"><!-- REPLACE: value --></div>
        <div class="kpi-label"><!-- REPLACE: LABEL --></div>
      </div>

      <div class="kpi">
        <div class="glow" style="background:var(--violet)"></div>
        <div class="kpi-value" style="color:var(--violet)"><!-- REPLACE: value --></div>
        <div class="kpi-label"><!-- REPLACE: LABEL --></div>
      </div>

      <div class="kpi">
        <div class="glow" style="background:var(--rose)"></div>
        <div class="kpi-value" style="color:var(--rose)"><!-- REPLACE: value --></div>
        <div class="kpi-label"><!-- REPLACE: LABEL --></div>
      </div>

    </div><!-- end .kpi-row -->

    <!-- ── CHART GRID ────────────────────────────────────────────────────────
         Default: 2 columns.
         Add class "single" for 1-column, "thirds" for 3-column.
         Add class "full" to a .chart-card to span all columns.
    ─────────────────────────────────────────────────────────────────────── -->
    <div class="chart-grid">

      <div class="chart-card">
        <div class="card-title"><!-- REPLACE: Panel Title --></div>
        <!-- REPLACE: insert chart, table, or other content here -->
      </div>

      <div class="chart-card">
        <div class="card-title"><!-- REPLACE: Panel Title --></div>
        <!-- REPLACE: insert chart, table, or other content here -->
      </div>

      <!-- Full-width panel — remove if not needed -->
      <div class="chart-card full">
        <div class="card-title"><!-- REPLACE: Panel Title --></div>
        <!-- REPLACE: insert chart, table, or other content here -->
      </div>

    </div><!-- end .chart-grid -->

  </div><!-- end .dashboard -->

</body>
